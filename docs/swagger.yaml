basePath: /
definitions:
  apierr.APIError:
    properties:
      detail:
        type: string
      instance:
        type: string
      status:
        type: integer
      title:
        type: string
      type:
        type: string
    type: object
  auth.AuthResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/users.UserResponse'
    type: object
  auth.LoginRequest:
    properties:
      email:
        type: string
      password:
        minLength: 1
        type: string
    required:
    - email
    - password
    type: object
  auth.SetupRequest:
    properties:
      email:
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  progress.AnswerRequest:
    properties:
      is_correct:
        type: boolean
    required:
    - is_correct
    type: object
  progress.ProgressResponse:
    properties:
      ease_factor:
        type: number
      interval_days:
        type: integer
      is_mastered:
        type: boolean
      is_saved:
        type: boolean
      last_reviewed_at:
        type: string
      next_review_at:
        type: string
      question_id:
        type: string
      repetitions:
        type: integer
    type: object
  questions.CodeChallengeResponse:
    properties:
      expected_output:
        type: string
      id:
        type: string
      language:
        type: string
      starter_code:
        type: string
      test_cases:
        type: string
    type: object
  questions.CreateOptionReq:
    properties:
      content:
        type: string
      is_correct:
        type: boolean
    required:
    - content
    type: object
  questions.CreateQuestionRequest:
    properties:
      content:
        type: string
      difficulty:
        enum:
        - beginner
        - intermediate
        - advanced
        type: string
      expected_output:
        type: string
      explanation:
        type: string
      language:
        type: string
      options:
        items:
          $ref: '#/definitions/questions.CreateOptionReq'
        type: array
      source:
        enum:
        - ai_generated
        - manual
        - imported
        type: string
      starter_code:
        type: string
      test_cases:
        type: string
      topic_ids:
        items:
          type: string
        minItems: 1
        type: array
      type:
        enum:
        - single_choice
        - multiple_choice
        - code_completion
        type: string
    required:
    - content
    - difficulty
    - topic_ids
    - type
    type: object
  questions.OptionResponse:
    properties:
      content:
        type: string
      id:
        type: string
      is_correct:
        type: boolean
    type: object
  questions.QuestionResponse:
    properties:
      code_challenge:
        $ref: '#/definitions/questions.CodeChallengeResponse'
      content:
        type: string
      created_at:
        type: string
      difficulty:
        type: string
      explanation:
        type: string
      id:
        type: string
      is_public:
        type: boolean
      options:
        items:
          $ref: '#/definitions/questions.OptionResponse'
        type: array
      source:
        type: string
      topics:
        items:
          $ref: '#/definitions/questions.TopicInfo'
        type: array
      type:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  questions.TopicInfo:
    properties:
      id:
        type: string
      name:
        type: string
      slug:
        type: string
    type: object
  questions.UpdateQuestionRequest:
    properties:
      content:
        type: string
      difficulty:
        enum:
        - beginner
        - intermediate
        - advanced
        type: string
      expected_output:
        type: string
      explanation:
        type: string
      language:
        type: string
      options:
        items:
          $ref: '#/definitions/questions.CreateOptionReq'
        type: array
      starter_code:
        type: string
      test_cases:
        type: string
      topic_ids:
        items:
          type: string
        type: array
    type: object
  response.Meta:
    properties:
      page:
        type: integer
      per_page:
        type: integer
      total:
        type: integer
    type: object
  topics.CreateTopicRequest:
    properties:
      category:
        maxLength: 50
        minLength: 1
        type: string
      name:
        maxLength: 150
        minLength: 1
        type: string
      slug:
        maxLength: 100
        minLength: 2
        type: string
    required:
    - category
    - name
    - slug
    type: object
  topics.TopicResponse:
    properties:
      category:
        type: string
      created_at:
        type: string
      id:
        type: string
      is_system:
        type: boolean
      name:
        type: string
      slug:
        type: string
      updated_at:
        type: string
    type: object
  topics.UpdateTopicRequest:
    properties:
      category:
        maxLength: 50
        minLength: 1
        type: string
      name:
        maxLength: 150
        minLength: 1
        type: string
    type: object
  users.CreateUserRequest:
    properties:
      email:
        type: string
      is_admin:
        type: boolean
      password:
        maxLength: 72
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  users.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      is_admin:
        type: boolean
      updated_at:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: felipe@example.com
    name: Felipe
  description: REST API con Go + Gin · Auth JWT · PostgreSQL · Swagger
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: dev-test-api
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Autentica un usuario y devuelve un token JWT
      parameters:
      - description: Credenciales de login
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierr.APIError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierr.APIError'
      summary: Iniciar sesión
      tags:
      - auth
  /api/v1/auth/setup:
    post:
      consumes:
      - application/json
      description: Crea el primer usuario admin del sistema. Solo funciona si no hay
        usuarios creados.
      parameters:
      - description: Credenciales del admin inicial
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auth.SetupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/auth.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierr.APIError'
        "409":
          description: System Already Initialized
          schema:
            $ref: '#/definitions/apierr.APIError'
      summary: Inicializar sistema (primer usuario admin)
      tags:
      - auth
  /api/v1/profile:
    get:
      description: Obtiene los datos del usuario autenticado
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/users.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierr.APIError'
      security:
      - BearerAuth: []
      summary: Obtener perfil
      tags:
      - profile
  /api/v1/progress/{question_id}/answer:
    post:
      consumes:
      - application/json
      description: Registra una respuesta correcta/incorrecta y actualiza el progreso
        SM-2
      parameters:
      - description: Question ID
        in: path
        name: question_id
        required: true
        type: string
      - description: Respuesta
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/progress.AnswerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/progress.ProgressResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierr.APIError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierr.APIError'
      security:
      - BearerAuth: []
      summary: Responder pregunta
      tags:
      - progress
  /api/v1/progress/{question_id}/toggle-save:
    post:
      description: Alterna el estado is_saved de una pregunta para el usuario
      parameters:
      - description: Question ID
        in: path
        name: question_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/progress.ProgressResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierr.APIError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierr.APIError'
      security:
      - BearerAuth: []
      summary: Marcar/desmarcar pregunta
      tags:
      - progress
  /api/v1/progress/saved:
    get:
      description: Lista todas las preguntas que el usuario ha guardado para repasar
      parameters:
      - description: 'Número de página (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Elementos por página (default: 20)'
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Preguntas guardadas
          schema:
            $ref: '#/definitions/response.Meta'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierr.APIError'
      security:
      - BearerAuth: []
      summary: Preguntas guardadas
      tags:
      - progress
  /api/v1/progress/upcoming:
    get:
      description: Lista las preguntas marcadas para repasar cuyo próximo repaso es
        hoy
      parameters:
      - description: 'Número de página (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Elementos por página (default: 20)'
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Preguntas pendientes
          schema:
            $ref: '#/definitions/response.Meta'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierr.APIError'
      security:
      - BearerAuth: []
      summary: Preguntas pendientes
      tags:
      - progress
  /api/v1/questions:
    get:
      description: Lista todas las preguntas disponibles, con filtros opcionales
      parameters:
      - description: 'Número de página (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Elementos por página (default: 20)'
        in: query
        name: per_page
        type: integer
      - description: Filtrar por tipo (single_choice, multiple_choice, code_completion)
        in: query
        name: type
        type: string
      - description: Filtrar por dificultad (beginner, intermediate, advanced)
        in: query
        name: difficulty
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Lista de preguntas
          schema:
            $ref: '#/definitions/response.Meta'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierr.APIError'
      security:
      - BearerAuth: []
      summary: Listar preguntas
      tags:
      - questions
    post:
      consumes:
      - application/json
      description: Crea una nueva pregunta con opciones o código
      parameters:
      - description: Datos de la pregunta
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/questions.CreateQuestionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/questions.QuestionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierr.APIError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierr.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/apierr.APIError'
      security:
      - BearerAuth: []
      summary: Crear pregunta (Admin)
      tags:
      - questions
  /api/v1/questions/{id}:
    delete:
      description: Elimina una pregunta (soft delete)
      parameters:
      - description: Question ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierr.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/apierr.APIError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierr.APIError'
      security:
      - BearerAuth: []
      summary: Eliminar pregunta (Admin)
      tags:
      - questions
    get:
      description: Obtiene una pregunta por ID con todos sus detalles (opciones, código,
        temas)
      parameters:
      - description: Question ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/questions.QuestionResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierr.APIError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierr.APIError'
      security:
      - BearerAuth: []
      summary: Obtener pregunta
      tags:
      - questions
    put:
      consumes:
      - application/json
      description: Actualiza una pregunta existente
      parameters:
      - description: Question ID
        in: path
        name: id
        required: true
        type: string
      - description: Datos a actualizar
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/questions.UpdateQuestionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/questions.QuestionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierr.APIError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierr.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/apierr.APIError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierr.APIError'
      security:
      - BearerAuth: []
      summary: Actualizar pregunta (Admin)
      tags:
      - questions
  /api/v1/topics:
    get:
      description: Lista todos los temas disponibles
      parameters:
      - description: 'Número de página (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Elementos por página (default: 20)'
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Lista de temas
          schema:
            $ref: '#/definitions/response.Meta'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierr.APIError'
      security:
      - BearerAuth: []
      summary: Listar temas
      tags:
      - topics
    post:
      consumes:
      - application/json
      description: Crea un nuevo tema personalizado
      parameters:
      - description: Datos del tema
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/topics.CreateTopicRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/topics.TopicResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierr.APIError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierr.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/apierr.APIError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/apierr.APIError'
      security:
      - BearerAuth: []
      summary: Crear tema (Admin)
      tags:
      - topics
  /api/v1/topics/{id}:
    delete:
      description: Elimina un tema
      parameters:
      - description: Topic ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierr.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/apierr.APIError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierr.APIError'
      security:
      - BearerAuth: []
      summary: Eliminar tema (Admin)
      tags:
      - topics
    get:
      description: Obtiene un tema por ID
      parameters:
      - description: Topic ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/topics.TopicResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierr.APIError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierr.APIError'
      security:
      - BearerAuth: []
      summary: Obtener tema
      tags:
      - topics
    put:
      consumes:
      - application/json
      description: Actualiza un tema existente
      parameters:
      - description: Topic ID
        in: path
        name: id
        required: true
        type: string
      - description: Datos a actualizar
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/topics.UpdateTopicRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/topics.TopicResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierr.APIError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierr.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/apierr.APIError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierr.APIError'
      security:
      - BearerAuth: []
      summary: Actualizar tema (Admin)
      tags:
      - topics
  /api/v1/users:
    get:
      description: Lista todos los usuarios
      parameters:
      - description: 'Número de página (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Elementos por página (default: 20)'
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Lista de usuarios
          schema:
            $ref: '#/definitions/response.Meta'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierr.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/apierr.APIError'
      security:
      - BearerAuth: []
      summary: Listar usuarios (Admin)
      tags:
      - users
    post:
      consumes:
      - application/json
      description: Crea un nuevo usuario
      parameters:
      - description: Datos del usuario
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/users.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/users.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierr.APIError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierr.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/apierr.APIError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/apierr.APIError'
      security:
      - BearerAuth: []
      summary: Crear usuario (Admin)
      tags:
      - users
  /api/v1/users/{id}:
    delete:
      description: Soft-delete de un usuario
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierr.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/apierr.APIError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierr.APIError'
      security:
      - BearerAuth: []
      summary: Eliminar usuario (Admin)
      tags:
      - users
    get:
      description: Obtiene un usuario por ID
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/users.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierr.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/apierr.APIError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierr.APIError'
      security:
      - BearerAuth: []
      summary: Obtener usuario (Admin)
      tags:
      - users
  /health:
    get:
      description: Verifica que el servidor esté corriendo
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - health
schemes:
- http
securityDefinitions:
  BearerAuth:
    description: 'JWT token. Prefix with "Bearer ". Example: "Bearer eyJhbG..."'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
