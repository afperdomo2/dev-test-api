basePath: /
definitions:
  apierr.APIError:
    properties:
      detail:
        type: string
      instance:
        type: string
      status:
        type: integer
      title:
        type: string
      type:
        type: string
    type: object
  auth.AuthResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/users.UserResponse'
    type: object
  auth.LoginRequest:
    properties:
      email:
        type: string
      password:
        minLength: 1
        type: string
    required:
    - email
    - password
    type: object
  auth.SetupRequest:
    properties:
      email:
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  response.Meta:
    properties:
      page:
        type: integer
      per_page:
        type: integer
      total:
        type: integer
    type: object
  topics.CreateTopicRequest:
    properties:
      category:
        maxLength: 50
        minLength: 1
        type: string
      name:
        maxLength: 150
        minLength: 1
        type: string
      slug:
        maxLength: 100
        minLength: 2
        type: string
    required:
    - category
    - name
    - slug
    type: object
  topics.TopicResponse:
    properties:
      category:
        type: string
      created_at:
        type: string
      id:
        type: string
      is_system:
        type: boolean
      name:
        type: string
      slug:
        type: string
      updated_at:
        type: string
    type: object
  topics.UpdateTopicRequest:
    properties:
      category:
        maxLength: 50
        minLength: 1
        type: string
      name:
        maxLength: 150
        minLength: 1
        type: string
    type: object
  users.CreateUserRequest:
    properties:
      email:
        type: string
      is_admin:
        type: boolean
      password:
        maxLength: 72
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  users.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      is_admin:
        type: boolean
      updated_at:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: felipe@example.com
    name: Felipe
  description: REST API con Go + Gin · Auth JWT · PostgreSQL · Swagger
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: dev-test-api
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Autentica un usuario y devuelve un token JWT
      parameters:
      - description: Credenciales de login
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierr.APIError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierr.APIError'
      summary: Iniciar sesión
      tags:
      - auth
  /api/v1/auth/setup:
    post:
      consumes:
      - application/json
      description: Crea el primer usuario admin del sistema. Solo funciona si no hay
        usuarios creados.
      parameters:
      - description: Credenciales del admin inicial
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auth.SetupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/auth.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierr.APIError'
        "409":
          description: System Already Initialized
          schema:
            $ref: '#/definitions/apierr.APIError'
      summary: Inicializar sistema (primer usuario admin)
      tags:
      - auth
  /api/v1/profile:
    get:
      description: Obtiene los datos del usuario autenticado
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/users.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierr.APIError'
      security:
      - BearerAuth: []
      summary: Obtener perfil
      tags:
      - profile
  /api/v1/topics:
    get:
      description: Lista todos los temas disponibles
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/topics.TopicResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierr.APIError'
      security:
      - BearerAuth: []
      summary: Listar temas
      tags:
      - topics
    post:
      consumes:
      - application/json
      description: Crea un nuevo tema personalizado (solo admin)
      parameters:
      - description: Datos del tema
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/topics.CreateTopicRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/topics.TopicResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierr.APIError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierr.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/apierr.APIError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/apierr.APIError'
      security:
      - BearerAuth: []
      summary: Crear tema (Admin)
      tags:
      - topics
  /api/v1/topics/{id}:
    delete:
      description: Elimina un tema (solo admin)
      parameters:
      - description: Topic ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierr.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/apierr.APIError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierr.APIError'
      security:
      - BearerAuth: []
      summary: Eliminar tema (Admin)
      tags:
      - topics
    get:
      description: Obtiene un tema por ID
      parameters:
      - description: Topic ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/topics.TopicResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierr.APIError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierr.APIError'
      security:
      - BearerAuth: []
      summary: Obtener tema
      tags:
      - topics
    put:
      consumes:
      - application/json
      description: Actualiza un tema existente (solo admin)
      parameters:
      - description: Topic ID
        in: path
        name: id
        required: true
        type: string
      - description: Datos a actualizar
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/topics.UpdateTopicRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/topics.TopicResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierr.APIError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierr.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/apierr.APIError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierr.APIError'
      security:
      - BearerAuth: []
      summary: Actualizar tema (Admin)
      tags:
      - topics
  /api/v1/users:
    get:
      description: Lista todos los usuarios (solo admin)
      produces:
      - application/json
      responses:
        "200":
          description: Lista de usuarios
          schema:
            $ref: '#/definitions/response.Meta'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierr.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/apierr.APIError'
      security:
      - BearerAuth: []
      summary: Listar usuarios (Admin)
      tags:
      - users
    post:
      consumes:
      - application/json
      description: Crea un nuevo usuario (solo admin)
      parameters:
      - description: Datos del usuario
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/users.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/users.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierr.APIError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierr.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/apierr.APIError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/apierr.APIError'
      security:
      - BearerAuth: []
      summary: Crear usuario (Admin)
      tags:
      - users
  /api/v1/users/{id}:
    delete:
      description: Soft-delete de un usuario (solo admin)
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierr.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/apierr.APIError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierr.APIError'
      security:
      - BearerAuth: []
      summary: Eliminar usuario (Admin)
      tags:
      - users
    get:
      description: Obtiene un usuario por ID (solo admin)
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/users.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierr.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/apierr.APIError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierr.APIError'
      security:
      - BearerAuth: []
      summary: Obtener usuario (Admin)
      tags:
      - users
  /health:
    get:
      description: Verifica que el servidor esté corriendo
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - health
schemes:
- http
securityDefinitions:
  BearerAuth:
    description: 'JWT token. Prefix with "Bearer ". Example: "Bearer eyJhbG..."'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
